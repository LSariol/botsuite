name: botsuite

services:
  botsuite:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: PROD
      COVE_CLIENT_URL: ${COVE_CLIENT_URL}
      COVE_CLIENT_SECRET: ${COVE_CLIENT_SECRET}
      NOTIFICATION_PORT: 2400
    container_name: botsuite
    ports:
      - "2400:2400"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2400/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - spark


networks:
    spark:
        external: true